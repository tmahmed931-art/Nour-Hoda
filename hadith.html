  <div class="container">
    <section id="hadith">
      <h2 class="section-title"><i class="fas fa-quote-right"></i> حديث نبوي شريف</h2>
      <div class="hadith-box" id="hadithBox">
        <div id="hadithText">بسم الله الرحمن الرحيم ...</div>
        <div id="hadithSource" style="margin-top:12px; font-weight:500;">-</div>
      </div>
      <button class="btn-refresh" id="refreshHadithBtn"><i class="fas fa-sync-alt"></i> حديث آخر</button>
      <p style="margin-top: 12px; font-size:0.85rem;">يتجدد تلقائيًا كل 40 ثانية 🌟</p>
    </section>

  <footer>
    <div class="container">
      <p><i class="fas fa-heart"></i> تصميم وتطوير: <strong>Momo</strong> — نسأل الله النفع <i class="fas fa-hands-praying"></i></p>
    </div>
  </footer>

  <script>
    const hadithList = [
      // الأحاديث الأصلية (30)
      { text: "إنما الأعمال بالنيات، وإنما لكل امرئ ما نوى.", source: "رواه البخاري ومسلم" },
      { text: "لا يؤمن أحدكم حتى يحب لأخيه ما يحب لنفسه.", source: "متفق عليه" },
      { text: "اتق الله حيثما كنت، وأتبع السيئة الحسنة تمحها، وخالق الناس بخلق حسن.", source: "رواه الترمذي" },
      { text: "المسلم من سلم المسلمون من لسانه ويده.", source: "متفق عليه" },
      { text: "الدين النصيحة: لله، ولكتابه، ولرسوله، ولأئمة المسلمين، وعامتهم.", source: "رواه مسلم" },
      { text: "خيركم من تعلم القرآن وعلمه.", source: "رواه البخاري" },
      { text: "لا تغضب.", source: "رواه البخاري" },
      { text: "الراحمون يرحمهم الرحمن، ارحموا من في الأرض يرحمكم من في السماء.", source: "رواه الترمذي" },
      { text: "الكلمة الطيبة صدقة.", source: "متفق عليه" },
      { text: "تبسمك في وجه أخيك صدقة.", source: "رواه الترمذي" },
      { text: "من كان يؤمن بالله واليوم الآخر فليقل خيراً أو ليصمت.", source: "متفق عليه" },
      { text: "لا تحاسدوا، ولا تناجشوا، ولا تباغضوا، ولا تدابروا، وكونوا عباد الله إخواناً.", source: "متفق عليه" },
      { text: "الحياء شعبة من الإيمان.", source: "متفق عليه" },
      { text: "طهور إناء أحدكم إذا ولغ فيه الكلب أن يغسله سبع مرات أولاهن بالتراب.", source: "رواه مسلم" },
      { text: "أحب البلاد إلى الله مساجدها، وأبغض البلاد إلى الله أسواقها.", source: "رواه مسلم" },
      { text: "صلاة الجماعة أفضل من صلاة الفرد بسبع وعشرين درجة.", source: "متفق عليه" },
      { text: "من صلى عليَّ صلاة صلى الله عليه بها عشراً.", source: "رواه مسلم" },
      { text: "لن يدخل أحداً منكم عمله الجنة. قالوا: ولا أنت يا رسول الله؟ قال: ولا أنا إلا أن يتغمدني الله برحمة منه وفضل.", source: "متفق عليه" },
      { text: "إن الله يحب إذا عمل أحدكم عملاً أن يتقنه.", source: "رواه البيهقي" },
      { text: "من حسن إسلام المرء تركه ما لا يعنيه.", source: "رواه الترمذي" },
      { text: "لا ضرر ولا ضرار.", source: "رواه ابن ماجه" },
      { text: "الدعاء هو العبادة.", source: "رواه الترمذي" },
      { text: "استوصوا بالنساء خيراً.", source: "متفق عليه" },
      { text: "ليس الشديد بالصرعة، إنما الشديد الذي يملك نفسه عند الغضب.", source: "متفق عليه" },
      { text: "ألا أنبئكم بأكبر الكبائر؟ الإشراك بالله، وعقوق الوالدين.", source: "متفق عليه" },
      { text: "من سلك طريقاً يلتمس فيه علماً سهل الله له به طريقاً إلى الجنة.", source: "رواه مسلم" },
      { text: "الطهور شطر الإيمان، والحمد لله تملأ الميزان.", source: "رواه مسلم" },
      { text: "لله أفرح بتوبة عبده من أحدكم سقط على بعيره وقد أضله في أرض فلاة.", source: "متفق عليه" },
      { text: "إن الحلال بيّن وإن الحرام بيّن، وبينهما أمور مشتبهات.", source: "متفق عليه" },
      { text: "المرء مع من أحب.", source: "متفق عليه" },
      
      // 30 حديثاً جديداً (الإجمالي 60)
      { text: "من يرد الله به خيراً يفقهه في الدين.", source: "رواه البخاري ومسلم" },
      { text: "المؤمن القوي خير وأحب إلى الله من المؤمن الضعيف، وفي كل خير.", source: "رواه مسلم" },
      { text: "لا يدخل الجنة من لا يأمن جاره بوائقه.", source: "رواه مسلم" },
      { text: "إياكم والظلم، فإن الظلم ظلمات يوم القيامة.", source: "رواه مسلم" },
      { text: "إن الله لا ينظر إلى صوركم وأموالكم ولكن ينظر إلى قلوبكم وأعمالكم.", source: "رواه مسلم" },
      { text: "أفشوا السلام، وأطعموا الطعام، وصلوا الأرحام، وصلوا بالليل والناس نيام، تدخلوا الجنة بسلام.", source: "رواه الترمذي" },
      { text: "كلكم راع وكلكم مسئول عن رعيته.", source: "رواه البخاري ومسلم" },
      { text: "من كان يؤمن بالله واليوم الآخر فليكرم ضيفه.", source: "رواه البخاري ومسلم" },
      { text: "لا يشكر الله من لا يشكر الناس.", source: "رواه أبو داود والترمذي" },
      { text: "الندم توبة.", source: "رواه ابن ماجه" },
      { text: "من قال لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير، في يوم مائة مرة، كانت له عدل عشر رقاب، وكتبت له مائة حسنة، ومحيت عنه مائة سيئة، وكانت له حرزاً من الشيطان يومه ذلك حتى يمسي.", source: "رواه البخاري ومسلم" },
      { text: "إذا مرض العبد أو سافر، كتب له ما كان يعمل مقيماً صحيحاً.", source: "رواه البخاري" },
      { text: "إن أصدق كلمة قالها الشاعر كلمة لبيد: ألا كل شيء ما خلا الله باطل.", source: "رواه البخاري" },
      { text: "أحب الأعمال إلى الله أدومها وإن قل.", source: "رواه مسلم" },
      { text: "لن يدخل أحدكم الجنة بعمله. قالوا: ولا أنت يا رسول الله؟ قال: ولا أنا إلا أن يتغمدني الله برحمة منه وفضل.", source: "متفق عليه" },
      { text: "من صام رمضان إيماناً واحتساباً غفر له ما تقدم من ذنبه.", source: "رواه البخاري ومسلم" },
      { text: "من قام ليلة القدر إيماناً واحتساباً غفر له ما تقدم من ذنبه.", source: "رواه البخاري ومسلم" },
      { text: "من حج فلم يرفث ولم يفسق، رجع كيوم ولدته أمه.", source: "رواه البخاري ومسلم" },
      { text: "العهد الذي بيننا وبينهم الصلاة، فمن تركها فقد كفر.", source: "رواه الترمذي" },
      { text: "من ترك صلاة العصر حبط عمله.", source: "رواه البخاري" },
      { text: "إذا كان يوم صوم أحدكم فلا يرفث ولا يصخب، فإن سابه أحد أو قاتله فليقل: إني صائم.", source: "رواه البخاري ومسلم" },
      { text: "الصيام جنة، فإذا كان يوم صوم أحدكم فلا يرفث ولا يصخب.", source: "رواه البخاري ومسلم" },
      { text: "من أنظر معسراً أو وضع له، أظله الله في ظله.", source: "رواه مسلم" },
      { text: "لعن الله آكل الربا وموكله وشاهديه وكاتبه.", source: "رواه مسلم" },
      { text: "البيعان بالخيار ما لم يتفرقا.", source: "رواه البخاري ومسلم" },
      { text: "رأس الأمر الإسلام، وعموده الصلاة، وذروة سنامه الجهاد في سبيل الله.", source: "رواه الترمذي" },
      { text: "من سره أن يبسط له في رزقه، وأن ينسأ له في أثره، فليصل رحمه.", source: "رواه البخاري" },
      { text: "تبسمك في وجه أخيك صدقة، وأمرك بالمعروف صدقة، ونهيك عن المنكر صدقة، وإرشادك الرجل في أرض الضلال صدقة، وإماطتك الأذى عن الطريق صدقة.", source: "رواه الترمذي" },
      { text: "من قتل وزغة في أول ضربة فله كذا وكذا حسنة، ومن قتلها في الثانية فله كذا وكذا، ومن قتلها في الثالثة فله كذا وكذا.", source: "رواه مسلم" },
      { text: "لا تدخلون الجنة حتى تؤمنوا، ولا تؤمنوا حتى تحابوا، أولا أدلكم على شيء إذا فعلتموه تحاببتم؟ أفشوا السلام بينكم.", source: "رواه مسلم" }
    ];

    let hadithInterval;
    function updateRandomHadith() {
      const randomIndex = Math.floor(Math.random() * hadithList.length);
      const hadith = hadithList[randomIndex];
      document.getElementById("hadithText").innerHTML = `“${hadith.text}”`;
      document.getElementById("hadithSource").innerHTML = `📚 ${hadith.source}`;
    }
    function startHadithAutoRefresh() {
      if (hadithInterval) clearInterval(hadithInterval);
      hadithInterval = setInterval(updateRandomHadith, 40000);
    }
    document.getElementById("refreshHadithBtn").addEventListener("click", () => {
      updateRandomHadith();
      startHadithAutoRefresh();
    });
    updateRandomHadith();
    startHadithAutoRefresh();
  </script>
</body>
