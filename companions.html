    function renderCompanionsList() {
      const container = document.getElementById("companionsList");
      container.innerHTML = companionsData.map((comp, idx) => `
        <button class="companion-btn" data-index="${idx}">
          <i class="fas ${comp.icon}"></i> ${comp.name}
        </button>
      `).join('');
      document.querySelectorAll(".companion-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".companion-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          const idx = parseInt(btn.getAttribute("data-index"));
          displayCompanionDetails(idx);
        });
      });
      if (companionsData.length) {
        document.querySelector(".companion-btn")?.classList.add("active");
        displayCompanionDetails(0);
      }
    }

    function displayCompanionDetails(index) {
      const comp = companionsData[index];
      const container = document.getElementById("storiesDisplay");
      if (!comp) return;
      container.innerHTML = `
        <div class="story-item">
          <h4><i class="fas fa-star-of-life"></i> ${comp.name} رضي الله عنه</h4>
          <p class="detail"><i class="fas fa-calendar-alt"></i> الميلاد: ${comp.birth} | الوفاة: ${comp.death} هـ</p>
          <p class="detail"><i class="fas fa-shield-alt"></i> الغزوات: ${comp.battles}</p>
          <p><i class="fas fa-book-open"></i> <strong>قصة وعبرة:</strong> ${comp.story}</p>
        </div>
      `;
    }

    renderCompanionsList();
  </script>
</body>
